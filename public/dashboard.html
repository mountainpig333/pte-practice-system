<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTE 練習系統 - 儀表板</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--pri:#667eea;--sec:#764ba2;--ok:#10b981;--warn:#f59e0b;--err:#ef4444;--gray:#6b7280}
        body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh}
        .header{background:linear-gradient(135deg,var(--pri),var(--sec));color:#fff;padding:20px 30px;display:flex;justify-content:space-between;align-items:center}
        .header h1{font-size:22px}
        .header a{color:#fff;text-decoration:none;background:rgba(255,255,255,.2);padding:8px 16px;border-radius:8px}
        .container{max-width:1000px;margin:30px auto;padding:0 20px}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-bottom:30px}
        .stat{background:#fff;border-radius:15px;padding:20px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .stat .num{font-size:32px;font-weight:bold;color:var(--pri)}
        .stat .lbl{color:var(--gray);font-size:13px;margin-top:5px}
        .card{background:#fff;border-radius:15px;padding:25px;margin-bottom:25px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .card h2{margin-bottom:15px;display:flex;align-items:center;gap:10px}
        textarea{width:100%;min-height:150px;padding:12px;border:2px solid #e5e7eb;border-radius:10px;font-size:14px;font-family:inherit;resize:vertical}
        textarea:focus{outline:none;border-color:var(--pri)}
        input[type=text]{width:100%;padding:12px;border:2px solid #e5e7eb;border-radius:10px;font-size:15px;margin-bottom:12px}
        input[type=text]:focus{outline:none;border-color:var(--pri)}
        .btn{padding:12px 30px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
        .btn-pri{background:linear-gradient(135deg,var(--pri),var(--sec));color:#fff}
        .btn-sec{background:#e5e7eb;color:#333}
        .btn:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(0,0,0,.15)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .article-list{display:grid;gap:12px}
        .article-item{border:2px solid #e5e7eb;border-radius:12px;padding:15px;cursor:pointer;transition:all .2s;display:flex;justify-content:space-between;align-items:center}
        .article-item:hover{border-color:var(--pri);transform:translateY(-2px)}
        .article-item .info h3{font-size:15px;margin-bottom:4px}
        .article-item .info .meta{font-size:12px;color:var(--gray)}
        .article-item .badge{background:var(--pri);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;white-space:nowrap}
        .article-item .del{background:var(--err);color:#fff;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;margin-left:8px}
        .loading{display:none;text-align:center;padding:20px;color:var(--gray)}
        .loading.active{display:block}
        .spinner{display:inline-block;width:30px;height:30px;border:3px solid #e5e7eb;border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .tabs{display:flex;gap:10px;margin-bottom:20px}
        .tab{padding:10px 20px;border:2px solid #e5e7eb;border-radius:10px;cursor:pointer;font-weight:500;transition:all .2s}
        .tab.active{border-color:var(--pri);background:var(--pri);color:#fff}
    </style>
</head>
<body>
    <div class="header">
        <h1>📚 PTE 練習系統</h1>
        <a href="/api/logout">登出</a>
    </div>

    <div class="container">
        <!-- Stats -->
        <div class="stats">
            <div class="stat"><div class="num" id="articleCount">0</div><div class="lbl">文章數</div></div>
            <div class="stat"><div class="num" id="totalQ">0</div><div class="lbl">總答題</div></div>
            <div class="stat"><div class="num" id="rate">0%</div><div class="lbl">正確率</div></div>
            <div class="stat"><div class="num" id="todayQ">0</div><div class="lbl">今日答題</div></div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="showTab('bank')">🎯 題庫練習</div>
            <div class="tab" onclick="showTab('upload')">📤 上傳文章</div>
            <div class="tab" onclick="showTab('articles')">📋 文章列表</div>
        </div>

        <!-- Question Bank Practice -->
        <div class="card" id="bankTab">
            <h2>🎯 題庫練習</h2>
            <p style="color:var(--gray);margin-bottom:20px">從題庫中隨機選題練習，每種題型 300+ 題</p>
            <div id="bankTypes" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px">
                <p style="color:var(--gray)">載入中...</p>
            </div>
            <div style="margin-top:20px;padding-top:15px;border-top:1px solid #e5e7eb;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
                <label style="font-weight:500">題數：</label>
                <select id="bankCount" style="padding:8px 12px;border:2px solid #e5e7eb;border-radius:8px;font-size:14px">
                    <option value="10">10 題</option>
                    <option value="20" selected>20 題</option>
                    <option value="30">30 題</option>
                    <option value="50">50 題</option>
                </select>
                <button class="btn btn-pri" onclick="startBankPractice('mixed')">🔀 綜合練習</button>
            </div>
        </div>

        <!-- Upload Article -->
        <div class="card" id="uploadTab">
            <h2>📤 上傳今日文章</h2>
            <form id="uploadForm">
                <input type="text" id="articleTitle" placeholder="文章標題（例：The Future of AI）" required>
                <textarea id="articleContent" placeholder="貼上文章內容...&#10;&#10;可以直接從經濟學人複製貼上" required></textarea>
                <div style="margin-top:15px;display:flex;gap:10px;align-items:center">
                    <button type="submit" class="btn btn-pri" id="uploadBtn">📤 上傳並生成題目</button>
                    <span id="uploadStatus" style="color:var(--gray);font-size:13px"></span>
                </div>
            </form>
            <div class="loading" id="uploadLoading">
                <div class="spinner"></div>
                <p style="margin-top:10px">🤖 AI 正在從文章中生成 PTE 題目...</p>
            </div>
        </div>

        <!-- Article List -->
        <div class="card" id="articlesTab" style="display:none">
            <h2>📋 已上傳文章</h2>
            <div class="article-list" id="articleList">
                <p style="color:var(--gray);text-align:center">載入中...</p>
            </div>
        </div>
    </div>

    <script>
    const TYPE_LABELS = {
        FIB: {icon:'📝',name:'Fill in the Blanks',cat:'Reading'},
        MCSA: {icon:'✅',name:'Multiple Choice (Single)',cat:'Reading'},
        MCMA: {icon:'☑️',name:'Multiple Choice (Multi)',cat:'Reading'},
        RO: {icon:'🔢',name:'Re-order Paragraphs',cat:'Reading'},
        RWFIB: {icon:'📝',name:'R&W Fill in Blanks',cat:'Reading'},
        SWT: {icon:'✍️',name:'Summarize Written Text',cat:'Writing'},
        WFD: {icon:'⌨️',name:'Write from Dictation',cat:'Listening'},
        HCS: {icon:'🔍',name:'Highlight Correct Summary',cat:'Listening'},
        HIW: {icon:'🚫',name:'Highlight Incorrect Words',cat:'Listening'},
        VOCAB: {icon:'📗',name:'Vocabulary in Context',cat:'Vocab'}
    };

    // Tab switching
    function showTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('bankTab').style.display = tab === 'bank' ? 'block' : 'none';
        document.getElementById('uploadTab').style.display = tab === 'upload' ? 'block' : 'none';
        document.getElementById('articlesTab').style.display = tab === 'articles' ? 'block' : 'none';
        if (tab === 'articles') loadArticles();
        if (tab === 'bank') loadBankStats();
    }

    // Bank
    async function loadBankStats() {
        try {
            const r = await fetch('/api/bank/stats');
            const d = await r.json();
            const div = document.getElementById('bankTypes');
            if (d.total === 0) {
                div.innerHTML = '<p style="color:var(--gray);grid-column:1/-1">題庫尚未建立，請先上傳文章或等待題庫生成</p>';
                return;
            }
            let html = '';
            for (const [type, count] of Object.entries(d.stats)) {
                const info = TYPE_LABELS[type] || {icon:'❓',name:type,cat:'Other'};
                html += `<div style="border:2px solid #e5e7eb;border-radius:12px;padding:15px;cursor:pointer;transition:all .2s;text-align:center" onclick="startBankPractice('${type}')" onmouseover="this.style.borderColor='var(--pri)'" onmouseout="this.style.borderColor='#e5e7eb'">
                    <div style="font-size:28px;margin-bottom:6px">${info.icon}</div>
                    <div style="font-weight:600;font-size:13px">${info.name}</div>
                    <div style="font-size:12px;color:var(--gray)">${count} 題</div>
                </div>`;
            }
            html += `<div style="border:2px solid var(--pri);border-radius:12px;padding:15px;text-align:center;background:#eef2ff">
                <div style="font-size:28px;margin-bottom:6px">📊</div>
                <div style="font-weight:600;font-size:13px">題庫總計</div>
                <div style="font-size:18px;color:var(--pri);font-weight:bold">${d.total} 題</div>
            </div>`;
            div.innerHTML = html;
        } catch(e) {
            document.getElementById('bankTypes').innerHTML = '<p style="color:var(--err)">載入失敗</p>';
        }
    }

    function startBankPractice(type) {
        const count = document.getElementById('bankCount').value;
        location.href = `/practice?bank=${type}&count=${count}`;
    }

    // Load stats
    async function loadStats() {
        try {
            const r = await fetch('/api/stats');
            const d = await r.json();
            document.getElementById('articleCount').textContent = d.articleCount || 0;
            document.getElementById('totalQ').textContent = d.total || 0;
            document.getElementById('rate').textContent = (d.rate || 0) + '%';
            document.getElementById('todayQ').textContent = d.todayTotal || 0;
        } catch(e) {}
    }

    // Load articles
    async function loadArticles() {
        const list = document.getElementById('articleList');
        try {
            const r = await fetch('/api/articles');
            const articles = await r.json();
            if (articles.length === 0) {
                list.innerHTML = '<p style="color:var(--gray);text-align:center">還沒有上傳文章</p>';
                return;
            }
            list.innerHTML = articles.map(a => `
                <div class="article-item">
                    <div class="info" onclick="location.href='/practice?id=${a.id}'">
                        <h3>${a.title}</h3>
                        <div class="meta">${a.date} · ${(a.questions||[]).length} 題</div>
                    </div>
                    <div>
                        <span class="badge" onclick="location.href='/practice?id=${a.id}'">${(a.questions||[]).length} 題</span>
                        <button class="del" onclick="deleteArticle(${a.id})">刪除</button>
                    </div>
                </div>
            `).reverse().join('');
        } catch(e) {
            list.innerHTML = '<p style="color:var(--err)">載入失敗</p>';
        }
    }

    // Upload article
    document.getElementById('uploadForm').onsubmit = async (e) => {
        e.preventDefault();
        const title = document.getElementById('articleTitle').value.trim();
        const content = document.getElementById('articleContent').value.trim();
        if (!title || !content) return;

        const btn = document.getElementById('uploadBtn');
        const loading = document.getElementById('uploadLoading');
        const status = document.getElementById('uploadStatus');

        btn.disabled = true;
        loading.classList.add('active');
        status.textContent = '';

        try {
            const r = await fetch('/api/articles', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ title, content })
            });
            const d = await r.json();

            if (d.success) {
                const qCount = (d.article.questions || []).length;
                status.textContent = `✅ 已生成 ${qCount} 道題目！`;
                status.style.color = 'var(--ok)';
                document.getElementById('articleTitle').value = '';
                document.getElementById('articleContent').value = '';
                loadStats();

                // Auto redirect to practice
                setTimeout(() => {
                    if (confirm(`已生成 ${qCount} 道 PTE 題目！\n要現在開始練習嗎？`)) {
                        location.href = '/practice?id=' + d.article.id;
                    }
                }, 500);
            } else {
                status.textContent = '❌ ' + (d.error || '上傳失敗');
                status.style.color = 'var(--err)';
            }
        } catch(e) {
            status.textContent = '❌ 網路錯誤';
            status.style.color = 'var(--err)';
        }

        btn.disabled = false;
        loading.classList.remove('active');
    };

    // Delete article
    async function deleteArticle(id) {
        if (!confirm('確定要刪除這篇文章嗎？')) return;
        await fetch('/api/articles/' + id, { method: 'DELETE' });
        loadArticles();
        loadStats();
    }

    // Init
    loadStats();
    </script>
</body>
</html>
