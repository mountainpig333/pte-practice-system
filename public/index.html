<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTE 練習系統</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center}
        .box{background:#fff;border-radius:20px;padding:40px;width:90%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
        h1{color:#667eea;margin-bottom:8px;font-size:28px}
        .sub{color:#888;margin-bottom:30px;font-size:14px}
        input{width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:12px;font-size:16px;margin-bottom:20px;text-align:center}
        input:focus{outline:none;border-color:#667eea}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s}
        .btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(102,126,234,.4)}
        .err{background:#fee;color:#c00;padding:10px;border-radius:8px;margin-bottom:15px;display:none;font-size:14px}
    </style>
</head>
<body>
    <div class="box">
        <h1>📚 PTE 練習系統</h1>
        <p class="sub">每日經濟學人文章 · PTE 題型練習</p>
        <div class="err" id="err"></div>
        <form id="f">
            <input type="password" id="pw" placeholder="請輸入密碼" required>
            <button type="submit" class="btn">進入系統</button>
        </form>
    </div>
    <script>
    document.getElementById('f').onsubmit=async e=>{
        e.preventDefault();
        const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('pw').value})});
        const d=await r.json();
        if(d.success)location.href='/dashboard';
        else{const el=document.getElementById('err');el.textContent=d.message||'密碼錯誤';el.style.display='block'}
    }
    </script>
</body>
</html>
